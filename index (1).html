// Derive combat stats from a fighter object
const getFS = f => {
  const p = f.perks || [],
    s = f.stats || {
      str: 5,
      mag: 5,
      dex: 5,
      int: 5,
      wil: 5
    };
  let str = (s.str || 0) + (has(p, "ashen_soul") ? 3 : 0);
  let mag = (s.mag || 0) + (has(p, "mana_veins") ? 3 : 0);
  let dex = s.dex || 0,
    wil = (s.wil || 0) + (has(p, "battle_hardened") ? 4 : 0) + (has(p, "unbreakable_will") ? 5 : 0) + (has(p, "hex_eater") ? 3 : 0);
  let int_ = s.int || 0;
  let physAtk = str * 2.0 + (f.weapon?.atk || 0);
  if (has(p, "rune_carver")) physAtk *= 1.15;
  let magAtk = mag * 2.5 + (has(p, "adaptive_mind") ? dex * 0.2 : 0) + (has(p, "arcane_blood") ? int_ * 0.625 : 0);
  if (has(p, "elemental_affinity")) magAtk *= 1.20;
  let armor = f.armor?.def || 0;
  if (has(p, "stone_skin")) armor = Math.floor(armor * 1.20);
  if (has(p, "guardian_aura")) armor += 5;
  if (has(p, "iron_bones") && f.currentHp < f.maxHp * 0.5) armor += 2;
  const critC = clamp(dex / 200 + (has(p, "duelist") ? 0.10 : 0), 0, 0.55);
  const dodgeC = clamp(dex / 300 + (has(p, "duelist") ? 0.10 : 0), 0, 0.50);
  const critM = has(p, "precision_strikes") ? 2.35 : 2.0;
  const isMag = magAtk > physAtk * 1.2;
  return {
    physAtk,
    magAtk,
    armor,
    wil,
    critC,
    dodgeC,
    critM,
    isMag,
    str,
    mag,
    dex,
    int: int_
  };
};

// Auto-level a party member
const levelMember = (m, gainRaw, expBonus = 0) => {
  const gain = Math.floor(gainRaw * (1 + expBonus));
  let {
    level,
    exp,
    expNext,
    hp,
    maxHp,
    stats,
    growth,
    perks,
    baseCls,
    advCls
  } = m;
  exp += gain;
  const msgs = [];
  while (exp >= expNext) {
    exp -= expNext;
    level++;
    expNext = expForLv(level);
    const ns = {};
    Object.keys(stats).forEach(k => ns[k] = (stats[k] || 0) + (growth[k] || 1));
    maxHp += growth.hp || 10;
    hp = Math.min(maxHp, hp + Math.floor((growth.hp || 10) * 0.4));
    stats = ns;
    if (has(perks, "ancient_soul") && level % 10 === 0) Object.keys(stats).forEach(k => stats[k] = (stats[k] || 0) + 1);
    if ([3, 7, 12, 18, 25].includes(level)) {
      const cp = bPerks(baseCls, advCls);
      const np = cp.find(pid => !(perks || []).includes(pid));
      if (np) perks = [...(perks || []), np];
    }
    msgs.push(`⬆️ ${m.name} (${clsLabel(baseCls, advCls)}) → Lv.${level}!`);
  }
  return {
    updated: {
      ...m,
      level,
      exp,
      expNext,
      hp,
      maxHp,
      stats,
      perks
    },
    msgs
  };
};

  } = p;

    statPoints += 2;
    if (level % 3 === 0) perkChoiceDue = (perkChoiceDue || 0) + 1;
    maxHp += 6;
    hp = Math.min(maxHp, hp + 6);

      const ns = {
        ...stats
      };
      Object.keys(ns).forEach(k => ns[k] = (ns[k] || 0) + 1);
      stats = ns;
    }
    msgs.push({
      t: "lvl",
      m: `⬆️ HERO → Level ${level}! +2 stat pts${level % 3 === 0 ? " & perk choice!" : ""}`
    });
  }
  return {
    updated: {
      ...p,
      level,
      exp,
      expNext,
      hp,
      maxHp,
      statPoints,
      perkChoiceDue: perkChoiceDue || 0,
      perks,
      stats
    },
    msgs
  };
};

const processDrops = (drops, p) => {
  let weapon = p.weapon ? {
      ...p.weapon
    } : null,
    armor = p.armor ? {
      ...p.armor
    } : null,
    inv = [...(p.inventory || [])];
  const out = drops.map(d => {
    if (d.type === "weapon") {
      if (!weapon || d.tier > weapon.tier) {
        if (weapon && inv.length < 8) inv.push(weapon);
        weapon = d;
        return {
          ...d,
          result: "Equipped ✓"
        };
      }
      if (inv.length < 8) {
        inv.push(d);
        return {
          ...d,
          result: "→ Inventory"
        };
      }
      return {
        ...d,
        result: "Full"
      };
    } else {
      if (!armor || d.tier > armor.tier) {
        if (armor && inv.length < 8) inv.push(armor);
        armor = d;
        return {
          ...d,
          result: "Equipped ✓"
        };
      }
      if (inv.length < 8) {
        inv.push(d);
        return {
          ...d,
          result: "→ Inventory"
        };
      }
      return {
        ...d,
        result: "Full"
      };
    }
  });
  return {
    weapon,
    armor,
    inventory: inv.slice(0, 8),
    out
  };
};

.lbl{color:#c9a84c;font-size:10px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #c9a84c33;}
.row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #ffffff08;font-size:13px;}
.log-entry{font-size:12px;line-height:1.65;animation:slideUp .15s ease;padding:1px 0;}
.log-atk{color:#e8d5a3;}.log-dmg{color:#e74c3c;}.log-heal{color:#2ecc71;}
.log-win{color:#f1c40f;font-weight:bold;}.log-lvl{color:#9b59b6;font-weight:bold;}.log-evt{color:#3498db;}
.track{background:#1a1a2e;height:6px;width:100%;margin-top:2px;}
.fill{height:100%;transition:width .35s;}
.title-glow{text-shadow:0 0 22px #c9a84c,0 0 55px #c9a84c44;}
.shake{animation:shake .32s;}
.tab{flex:1;background:#0d0d1b;border:1px solid #c9a84c33;color:#555;font-family:'Courier New',monospace;font-size:12px;padding:6px 4px;cursor:pointer;-webkit-appearance:none;border-radius:0;letter-spacing:.08em;}
.tab.on{background:#c9a84c1a;border-color:#c9a84c;color:#c9a84c;}
.cntbtn{background:#0d0d1b;border:2px solid #c9a84c44;color:#e8d5a3;font-family:'Courier New',monospace;font-size:15px;padding:9px 14px;cursor:pointer;-webkit-appearance:none;border-radius:0;}
.cntbtn:active{background:#c9a84c22;}
.preset{background:#0d0d1b;border:1px solid #c9a84c33;color:#666;font-family:'Courier New',monospace;font-size:12px;padding:5px 9px;cursor:pointer;-webkit-appearance:none;border-radius:0;}
.preset.on,.preset:active{border-color:#c9a84c;color:#c9a84c;background:#c9a84c11;}`;

// ── APP
function App() {
  const [screen, setScreen] = useState("title");
  const [player, setPlayer] = useState(makePlayer);
  const [party, setParty] = useState([]);
  const [pool, setPool] = useState(() => getPool(1));
  const [shop, setShop] = useState(() => genShop(1));
  const [log, setLog] = useState([]);
  const [battle, setBattle] = useState(null);
  const [results, setResults] = useState(null);
  const [shake, setShake] = useState(false);
  const [gTab, setGTab] = useState("hire");
  const [selZone, setSelZone] = useState(null);
  const [planCount, setPlanCount] = useState(10);
  const [clsChoice, setClsChoice] = useState(null);
  const [perkChoices, setPerkChoices] = useState(null);
  const playerRef = useRef(player);
  const partyRef = useRef(party);
  const logRef = useRef(null);
  useEffect(() => {
    playerRef.current = player;
  }, [player]);
  useEffect(() => {
    partyRef.current = party;
  }, [party]);
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);
  const pushLog = useCallback(e => setLog(l => [...l, ...e].slice(-120)), []);
  const setCount = n => setPlanCount(clamp(n, 1, 100));

  // Show perk choices if pending
  useEffect(() => {
    if (player.perkChoiceDue > 0 && !perkChoices && screen === "menu") {
      setPerkChoices(genPerkChoices(player.perks));
    }
  }, [player.perkChoiceDue, screen]);

  // ── RESOLVE ADVENTURE
  const resolveAdventure = useCallback((totalExp, totalGold, fighters, wipe, rawDrops = [], done = 0, planned = 0) => {
    const p = playerRef.current;
    const expBonus = has(p.perks, "scholar") || partyRef.current.some(m => has(m.perks, "scholar")) ? 0.10 : 0;
    const goldMult = has(p.perks, "deep_pockets") ? 1.10 : 1;
    const {
      weapon,
      armor,
      inventory,
      out: processed
    } = processDrops(rawDrops, p);
    const heroRes = levelHero({
      ...p,
      exp: p.exp + Math.floor(totalExp * (1 + expBonus)),
      weapon,
      armor,
      inventory
    });
    heroRes.msgs.forEach(m => pushLog([m]));
    setPlayer({
      ...heroRes.updated,
      gold: heroRes.updated.gold + Math.floor(totalGold * goldMult)
    });
    const mExp = wipe ? Math.floor(totalExp * 0.4) : totalExp;
    const newParty = partyRef.current.map(m => {
      const f = fighters.find(x => x.id === m.id);
      const {
        updated,
        msgs
      } = levelMember(m, mExp, expBonus);
      msgs.forEach(msg => pushLog([{
        t: "lvl",
        m: msg
      }]));
      const hp = f?.alive ? Math.min(updated.maxHp, (f.currentHp || 0) + 25) : Math.max(1, Math.floor(updated.maxHp * 0.08));
      return {
        ...updated,
        hp
      };
    });
    setParty(newParty);
    setResults({
      exp: Math.floor(totalExp * (1 + expBonus)),
      gold: Math.floor(totalGold * goldMult),
      wipe,
      drops: processed,
      survived: fighters.filter(f => f.alive).length,
      total: fighters.length,
      done,
      planned
    });
    setTimeout(() => setScreen("results"), 900);
  }, [pushLog]);
  useEffect(() => {
    if (!battle) return;
    if (battle.phase === "victory") resolveAdventure(battle.exp, battle.gold, battle.fighters, false, battle.drops, battle.doneEnc, battle.totalEnc);else if (battle.phase === "wipe") resolveAdventure(Math.floor(battle.exp * 0.35), Math.floor(battle.gold * 0.25), battle.fighters, true, battle.drops.slice(0, Math.ceil(battle.drops.length / 2)), battle.doneEnc, battle.totalEnc);
  }, [battle?.phase, resolveAdventure]);

  // ── HIRE/FIRE
  const hire = adv => {
    if (party.length >= 3 || player.gold < adv.wage) return;
    setPlayer(p => ({
      ...p,
      gold: p.gold - adv.wage
    }));
    setParty(p => [...p, {
      ...adv
    }]);
    setPool(p => p.filter(a => a.id !== adv.id));
  };
  const fire = adv => {
    setParty(p => p.filter(a => a.id !== adv.id));
    setPool(p => [...p, adv]);
  };
  const refreshPool = () => {
    if (player.gold < 20) return;
    setPlayer(p => ({
      ...p,
      gold: p.gold - 20
    }));
    setPool(getPool(player.level));
  };

  // ── CLASS PROMOTIONS
  const promoteBase = (member, clsId) => {
    const bc = BASE_CLASSES.find(b => b.id === clsId);
    if (!bc) return;
    setParty(p => p.map(m => {
      if (m.id !== member.id) return m;
      const stats = {};
      Object.keys(bc.stats).forEach(k => stats[k] = Math.max(m.stats[k] || 0, bc.stats[k] || 0));
      const maxHp = Math.max(m.maxHp, bc.hp);
      const hp = Math.min(maxHp, m.hp + 15);
      const perks = [...(m.perks || []), ...bc.perks.filter(p => !(m.perks || []).includes(p))];
      return {
        ...m,
        cls: bc.name,
        baseCls: bc.id,
        growth: {
          ...bc.growth
        },
        stats,
        maxHp,
        hp,
        perks,
        heal: bc.id === "cleric" ? 20 : m.heal
      };
    }));
    setClsChoice(null);
  };
  const promoteAdv = (member, clsId) => {
    const ac = ADV_CLASSES.find(a => a.id === clsId);
    if (!ac) return;
    setParty(p => p.map(m => {
      if (m.id !== member.id) return m;
      const stats = {
        ...m.stats
      };
      Object.keys(ac.boost || {}).forEach(k => stats[k] = (stats[k] || 0) + ac.boost[k]);
      const maxHp = m.maxHp + 20;
      const hp = Math.min(maxHp, m.hp + 20);
      const perks = [...(m.perks || []), ...ac.perks.filter(p => !(m.perks || []).includes(p))];
      return {
        ...m,
        cls: ac.name,
        advCls: ac.id,
        growth: {
          ...ac.growth
        },
        stats,
        maxHp,
        hp,
        perks,
        heal: ["saint", "paladin"].includes(ac.id) ? 30 : m.heal
      };
    }));
    setClsChoice(null);
  };

  // ── SHOP/INVENTORY
  const buyItem = item => {
    if (player.gold < item.price) return;
    setPlayer(p => {
      let {
        weapon,
        armor
      } = p;
      let inv = [...(p.inventory || [])];
      if (item.type === "weapon") {
        if (!weapon || item.tier >= weapon.tier) {
          if (weapon) inv.push(weapon);
          weapon = item;
        } else if (inv.length < 8) inv.push(item);
      } else {
        if (!armor || item.tier >= armor.tier) {
          if (armor) inv.push(armor);
          armor = item;
        } else if (inv.length < 8) inv.push(item);
      }
      return {
        ...p,
        gold: p.gold - item.price,
        weapon,
        armor,
        inventory: inv.slice(0, 8)
      };
    });
    setShop(s => s.filter(x => x.shopId !== item.shopId));
  };
  const refreshShop = () => {
    if (player.gold < 30) return;
    setPlayer(p => ({
      ...p,
      gold: p.gold - 30
    }));
    setShop(genShop(player.level));
  };
  const equipFromInv = (item, idx) => setPlayer(p => {
    let inv = [...(p.inventory || [])],
      weapon = p.weapon,
      armor = p.armor;
    if (item.type === "weapon") {
      if (weapon) inv[idx] = weapon;else inv.splice(idx, 1);
      weapon = item;
    } else {
      if (armor) inv[idx] = armor;else inv.splice(idx, 1);
      armor = item;
    }
    return {
      ...p,
      weapon,
      armor,
      inventory: inv
    };
  });
  const dropFromInv = idx => setPlayer(p => {
    const i = [...(p.inventory || [])];
    i.splice(idx, 1);
    return {
      ...p,
      inventory: i
    };
  });
  const unequip = slot => setPlayer(p => {
    const item = p[slot];
    if (!item) return p;
    const inv = [...(p.inventory || [])];
    if (inv.length < 8) inv.push(item);
    return {
      ...p,
      [slot]: null,
      inventory: inv
    };
  });

  // ── START ZONE
  const startZone = (zone, count) => {
    const isBoss = Math.random() < 0.01;
    const base = isBoss ? buildBoss(zone.id, player.level, zone.diff) || scaleEnemy(pickEnemy(zone.id, player.level), player.level, zone.diff) : scaleEnemy(pickEnemy(zone.id, player.level), player.level, zone.diff);
    const fighters = [{
      ...player,
      currentHp: player.hp,
      maxHp: player.maxHp,
      alive: true,
      isHero: true,
      mStacks: 0,
      gwUsed: player.gwUsed || false,
      ssUsed: false,
      bleedRounds: 0,
      drBonus: false
    }, ...party.map(m => ({
      ...m,
      currentHp: m.hp,
      alive: true,
      mStacks: 0,
      gwUsed: false,
      ssUsed: false,
      bleedRounds: 0,
      drBonus: false
    }))];
    setBattle({
      fighters,
      enemy: base,
      exp: 0,
      gold: 0,
      drops: [],
      phase: "player",
      zone: zone.id,
      isBoss,
      heroAbUsed: false,
      heroDefending: false,
      mAb: {},
      round: 0,
      totalEnc: count,
      doneEnc: 0,
      morale: 100
    });
    setLog([{
      t: "evt",
      m: `${zone.emoji} Party enters ${zone.name} — ${count} encounter${count > 1 ? "s" : ""} planned!`
    }, isBoss ? {
      t: "dmg",
      m: `⚠️⚠️ BOSS: ${base.emoji} ${base.name}  HP:${base.currentHp} ⚠️⚠️`
    } : {
      t: "evt",
      m: `⚠️ Encounter 1/${count}: ${base.emoji} ${base.name}  HP:${base.currentHp}`
    }]);
    setScreen("battle");
  };

  // ── BATTLE COMBAT ENGINE
  const doAction = actionType => {
    if (!battle || battle.phase !== "player") return;
    const zone = ZONES.find(z => z.id === battle.zone);

    // FLEE
    if (actionType === "flee") {
      const ms = getMS(battle.morale);
      const hfs = getFS(battle.fighters[0] || {
        perks: [],
        stats: {
          dex: 5
        },
        currentHp: 100,
        maxHp: 100,
        armor: 0
      });
      const fPct = clamp(0.30 + ms.flee + hfs.dex / 500, 0.05, 0.90);
      if (Math.random() < fPct) {
        pushLog([{
          t: "evt",
          m: "🏃 Fled successfully! Partial rewards kept."
        }]);
        setBattle(b => ({
          ...b,
          phase: "wipe"
        }));
      } else {
        const en = battle.enemy;
        const nf = battle.fighters.map(f => ({
          ...f
        }));
        const alive = nf.filter(f => f.alive);
        const msgs = [{
          t: "dmg",
          m: "🏃 Flee failed! Enemy retaliates!"
        }];
        if (alive.length) {
          const t = alive[rnd(0, alive.length - 1)];
          const dmg = Math.max(1, en.atk - (t.armor || 0) * 0.6 + rnd(-2, 4));
          t.currentHp = Math.max(0, t.currentHp - dmg);
          if (t.currentHp <= 0) {
            t.alive = false;
            msgs.push({
              t: "dmg",
              m: `💔 ${t.name} falls!`
            });
          } else msgs.push({
            t: "dmg",
            m: `${en.emoji}→${t.emoji} ${t.name} [${dmg}]`
          });
          const fi = nf.findIndex(x => x.id === t.id);
          if (fi >= 0) nf[fi] = t;
        }
        pushLog(msgs);
        if (!nf.some(f => f.alive)) {
          setBattle(b => ({
            ...b,
            fighters: nf,
            phase: "wipe"
          }));
          return;
        }
        setBattle(b => ({
          ...b,
          fighters: nf
        }));
        setShake(true);
        setTimeout(() => setShake(false), 350);
      }
      return;
    }
    let {
      fighters,
      enemy,
      exp,
      gold,
      drops,
      mAb,
      round,
      isBoss,
      heroAbUsed,
      heroDefending,
      totalEnc,
      doneEnc,
      morale
    } = battle;
    fighters = fighters.map(f => ({
      ...f
    }));
    enemy = {
      ...enemy
    };
    const entries = [];
    const newRound = round + 1;
    const isSpec = actionType === "special" && !heroAbUsed;
    const isDef = actionType === "defend";
    const newMA = {
      ...mAb
    };
    let morDelta = 0;
    const ms = getMS(morale);

    // ── APPLY BLEEDS
    fighters.forEach(f => {
      if (f.alive && f.bleedRounds > 0) {
        const bd = Math.floor(f.maxHp * 0.03);
        f.currentHp = Math.max(0, f.currentHp - bd);
        f.bleedRounds--;
        entries.push({
          t: "dmg",
          m: `🩸 ${f.name} bleeds −${bd}HP (${f.bleedRounds} left)`
        });
        if (f.currentHp <= 0) {
          f.alive = false;
          morDelta -= 15;
          entries.push({
            t: "dmg",
            m: `💔 ${f.name} falls to bleed!`
          });
        }
      }
    });

    // ── HERO ACTION
    const hero = fighters[0];
    if (hero?.alive && !isDef) {
      const hfs = getFS(hero);
      let isMag = hfs.isMag;
      let rawAtk = isMag ? hfs.magAtk : hfs.physAtk;
      let dmg,
        crit = false;
      // Shadowstep: first round first attack miss chance
      if (newRound === 1 && !hero.ssUsed && has(hero.perks, "shadowstep") && Math.random() < 0.50) {
        hero.ssUsed = true;
        entries.push({
          t: "heal",
          m: "👤 Hero's Shadowstep evaded the opening strike!"
        });
      } else {
        if (!isMag) {
          const eArm = (enemy.armor || 0) * 0.6;
          dmg = Math.max(1, rawAtk - eArm + rnd(-3, 8));
        } else {
          const eWil = (enemy.wil || 0) * (has(hero.perks, "mystic_focus") ? 0.40 : 0.50);
          dmg = Math.max(1, rawAtk - eWil + rnd(-3, 8));
        }
        // Perk mods
        if (has(hero.perks, "berserker_rage")) dmg = Math.floor(dmg * (1 + (1 - hero.currentHp / hero.maxHp) * 0.5));
        if (has(hero.perks, "executioner") && enemy.currentHp < enemy.hp * 0.30) dmg = Math.floor(dmg * 1.25);
        if (has(hero.perks, "momentum") && hero.mStacks > 0) dmg = Math.floor(dmg * (1 + Math.min(5, hero.mStacks) * 0.03));
        if (hero.drBonus) {
          dmg = Math.floor(dmg * 1.10);
          hero.drBonus = false;
        }
        dmg = Math.floor(dmg * ms.mult);
        if (isSpec) {
          dmg = Math.floor(dmg * 2.2);
          entries.push({
            t: "win",
            m: `💥 Hero Power Strike → ${enemy.emoji} ${enemy.name} [${dmg} dmg]!`
          });
        } else entries.push({
          t: "atk",
          m: `🦸 Hero Lv.${hero.level} → ${enemy.emoji} ${enemy.name} [${dmg} dmg]`
        });
        // Crit check
        if (Math.random() < hfs.critC) {
          dmg = Math.floor(dmg * hfs.critM);
          crit = true;
          morDelta += 5;
          entries.push({
            t: "win",
            m: `✨ CRIT! ×${hfs.critM.toFixed(2)}`
          });
          if (has(hero.perks, "bloodletter")) {
            enemy.bleedApplied = 3;
            entries.push({
              t: "dmg",
              m: "🩸 Bleed inflicted on enemy!"
            });
          }
        }
        // Vampiric
        if (!isMag && has(hero.perks, "vampiric_appetite")) {
          const h = Math.floor(dmg * 0.08);
          hero.currentHp = Math.min(hero.maxHp, hero.currentHp + h);
          if (h > 0) entries.push({
            t: "heal",
            m: `🧛 Vampiric: Hero +${h}HP`
          });
        }
        hero.mStacks = crit ? 0 : Math.min(5, (hero.mStacks || 0) + 1);
        enemy.currentHp -= dmg;
        morDelta += 2;
      }
      fighters[0] = hero;
    } else if (isDef) {
      entries.push({
        t: "heal",
        m: `🛡️ Hero braces! Damage halved this round.`
      });
    }

    // ── PARTY ACTIONS
    fighters.slice(1).forEach((f, fi) => {
      if (!f.alive || enemy.currentHp <= 0) return;
      const fs = getFS(f);
      // Healer logic
      if (f.heal > 0) {
        const allLow = fighters.some(x => x.alive && x.currentHp < x.maxHp * 0.5);
        if (!newMA[f.id] && allLow) {
          const h = f.heal + Math.floor(fs.mag * 0.8) + rnd(3, 12);
          fighters.forEach(x => {
            if (x.alive) {
              x.currentHp = Math.min(x.maxHp, x.currentHp + h);
              if (has(f.perks, "divine_resonance")) x.drBonus = true;
            }
          });
          entries.push({
            t: "heal",
            m: `✨ ${f.name}: Mass Heal! All party +${h}HP!`
          });
          newMA[f.id] = "heal";
          morDelta += 8;
          return;
        }
        const hurt = fighters.find(x => x.alive && x.currentHp < x.maxHp * 0.4);
        if (hurt) {
          const h = f.heal + Math.floor(fs.mag * 0.5) + rnd(0, 8);
          hurt.currentHp = Math.min(hurt.maxHp, hurt.currentHp + h);
          if (has(f.perks, "divine_resonance")) hurt.drBonus = true;
          entries.push({
            t: "heal",
            m: `✨ ${f.name} heals ${hurt.name} +${h}HP!`
          });
          morDelta += 4;
          return;
        }
      }
      // Resurrection
      if (has(f.perks, "gravewalker") && !f.gwUsed) {
        const fallen = fighters.find(x => !x.alive);
        if (fallen) {
          fallen.alive = true;
          fallen.currentHp = Math.floor(fallen.maxHp * 0.3);
          f.gwUsed = true;
          entries.push({
            t: "heal",
            m: `☠️ ${f.name}: Gravewalker — ${fallen.name} revived!`
          });
          morDelta += 20;
          return;
        }
      }
      // Attack
      let dmg = Math.max(1, fs.physAtk - (enemy.armor || 0) * 0.6 + rnd(-3, 7));
      if (fs.isMag) dmg = Math.max(1, fs.magAtk - (enemy.wil || 0) * (has(f.perks, "mystic_focus") ? 0.40 : 0.50) + rnd(-3, 7));
      if (has(f.perks, "berserker_rage")) dmg = Math.floor(dmg * (1 + (1 - f.currentHp / f.maxHp) * 0.5));
      if (has(f.perks, "executioner") && enemy.currentHp < enemy.hp * 0.30) dmg = Math.floor(dmg * 1.25);
      if (has(f.perks, "momentum") && f.mStacks > 0) dmg = Math.floor(dmg * (1 + Math.min(5, f.mStacks) * 0.03));
      if (f.drBonus) {
        dmg = Math.floor(dmg * 1.10);
        f.drBonus = false;
      }
      dmg = Math.floor(dmg * ms.mult);
      let crit = false;
      if (Math.random() < fs.critC) {
        dmg = Math.floor(dmg * fs.critM);
        crit = true;
        morDelta += 3;
        entries.push({
          t: "win",
          m: `✨ ${f.name} crits!`
        });
        if (has(f.perks, "bloodletter")) {
          enemy.bleedApplied = 3;
          entries.push({
            t: "dmg",
            m: "🩸 Bleed!"
          });
        }
      }
      if (!fs.isMag && has(f.perks, "vampiric_appetite")) {
        const h = Math.floor(dmg * 0.08);
        f.currentHp = Math.min(f.maxHp, f.currentHp + h);
      }
      f.mStacks = crit ? 0 : Math.min(5, (f.mStacks || 0) + 1);
      entries.push({
        t: "atk",
        m: `${clsEmoji(f.baseCls, f.advCls)} ${f.name} Lv.${f.level} → ${enemy.emoji} [${dmg}]`
      });
      enemy.currentHp -= dmg;
      fighters[fi + 1] = f;
    });

    // ── ENEMY DEFEATED
    if (enemy.currentHp <= 0) {
      exp += enemy.exp;
